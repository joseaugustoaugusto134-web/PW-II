<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel do Administrador — OviSystem</title>
  <link rel="stylesheet" href="assets/_common/styles/reset.css" />
  <link rel="stylesheet" href="assets/_common/styles/base.css" />
  <link rel="stylesheet" href="assets/_common/styles/dashboard.css" />
</head>
<body class="app-body">
  <header class="topbar topbar--app">
    <a href="../index.html" class="brand">
      <span class="brand__mark">🐑</span>
      <span class="brand__name">OviSystem</span>
      <span class="brand__tag">Admin</span>
    </a>
    <nav class="topbar__nav">
      <a href="lotes.html" class="navlink">Lotes</a>
      <a href="admin-dashboard.html" class="navlink navlink--active">Admin</a>
      <a href="login.html" class="btn btn--ghost">Sair</a>
    </nav>
  </header>
  <main class="app">
    <section class="page-header">
      <div>
        <h1>Usuários cadastrados</h1>
        <p class="muted">Visão geral dos criadores que usam o sistema.</p>
      </div>
    </section>
    <section class="stats">
      <div class="stat">
        <span class="stat__label">Usuários</span>
        <strong class="stat__value" id="statUsers">—</strong>
      </div>
      <div class="stat">
        <span class="stat__label">Ativos</span>
        <strong class="stat__value" id="statAtivos">—</strong>
      </div>
      <div class="stat">
        <span class="stat__label">Propriedades</span>
        <strong class="stat__value" id="statFazendas">—</strong>
      </div>
    </section>
    <section class="card">
      <div class="card__head">
        <h2>Lista de usuários</h2>
        <input type="search" id="busca" placeholder="Buscar por nome ou e-mail" class="search" />
      </div>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Propriedade</th>
              <th>Status</th>
              <th>Cadastro</th>
            </tr>
          </thead>
          <tbody id="tbodyUsers"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="assets/admin/scripts/dashboard.js" defer></script>
</body>
</html>
