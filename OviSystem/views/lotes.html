<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lotes e Ovelhas — OviSystem</title>
  <link rel="stylesheet" href="assets/_common/styles/reset.css" />
  <link rel="stylesheet" href="assets/_common/styles/base.css" />
  <link rel="stylesheet" href="assets/_common/styles/lotes.css" />
</head>
<body class="app-body">
  <header class="topbar topbar--app">
    <a href="../index.html" class="brand">
      <span class="brand__mark">🐑</span>
      <span class="brand__name">OviSystem</span>
    </a>
    <nav class="topbar__nav">
      <a href="lotes.html" class="navlink navlink--active">Lotes</a>
      <a href="admin-dashboard.html" class="navlink">Admin</a>
      <a href="login.html" class="btn btn--ghost">Sair</a>
    </nav>
  </header>

  <main class="app">
    <section class="page-header">
      <div>
        <h1>Lotes do rebanho</h1>
        <p class="muted">Selecione um lote para ver as ovelhas.</p>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--outline" id="btnCriarLote">+ Criar lote</button>
        <button class="btn btn--primary" id="btnAddOvelha">+ Adicionar ovelha</button>
      </div>
    </section>

    <section class="lotes" id="lotes"></section>

    <section class="ovelhas-section ovelhas-section--hidden" id="ovelhasSection">
      <div class="section-header">
        <h2 id="loteTitulo">Ovelhas</h2>
        <button class="btn btn--outline" id="btnVoltar">← Voltar aos lotes</button>
      </div>

      <!-- Barra de filtros — populada pelo JS -->
      <div class="filtros-bar" id="filtrosBar"></div>

      <div class="ovelhas-grid" id="ovelhasGrid"></div>
    </section>
  </main>

  <script src="assets/app/scripts/lotes.js" defer></script>
</body>
</html>
