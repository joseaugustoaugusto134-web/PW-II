<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar — OviSystem</title>
  <link rel="stylesheet" href="assets/_common/styles/reset.css" />
  <link rel="stylesheet" href="assets/_common/styles/base.css" />
  <link rel="stylesheet" href="assets/_common/styles/auth.css" />
</head>
<body class="auth-body">
  <header class="topbar">
    <a href="../index.html" class="brand">
      <span class="brand__mark">🐑</span>
      <span class="brand__name">OviSystem</span>
    </a>
    <nav class="topbar__nav">
      <a href="cadastro.html" class="btn btn--ghost">Cadastrar</a>
    </nav>
  </header>
  <main class="auth">
    <section class="auth__card">
      <h1>Entrar</h1>
      <p class="auth__sub">Acesse o painel do seu rebanho.</p>
      <form class="form" onsubmit="event.preventDefault(); window.location.href='lotes.html';">
        <label class="field">
          <span>E-mail</span>
          <input type="email" name="email" placeholder="seu@email.com" required />
        </label>
        <label class="field">
          <span>Senha</span>
          <input type="password" name="senha" placeholder="••••••••" required />
        </label>
        <div class="form__row">
          <label class="checkbox">
            <input type="checkbox" /> Lembrar de mim
          </label>
          <a href="#" class="link">Esqueci minha senha</a>
        </div>
        <button type="submit" class="btn btn--primary btn--lg btn--block">Entrar</button>
      </form>
      <p class="auth__footer">
        Ainda não tem conta? <a href="cadastro.html" class="link">Criar agora</a>
      </p>
    </section>
  </main>
</body>
</html>
